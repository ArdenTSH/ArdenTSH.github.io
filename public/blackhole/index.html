<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Black Hole Simulation</title>
        <link rel="icon" type="image/svg+xml" href="assets/img/icons/black-hole.svg">
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <!-- Font Awesome CDN removed: the app's chrome is hidden in background mode. -->
        <!-- Background-mode overrides: hide non-navigation UI so the render shows. -->
        <style>
            html, body { margin: 0; background: #000; overflow: hidden; }
            .link-bar, #hint-text, .info, .dg, .dg.ac, .dg.main { display: none !important; }
            canvas { display: block !important; }
        </style>
    </head>
    <body>
        <div id="hint-text" class="hidden-phone initially-hidden"></div>
        <div class="info "><div id="loader">Loading...</div></div>
        <div class="link-bar"></div>

        <script src="js-libs/jquery-2.1.4.min.js"></script>
        <script src="js-libs/three.min.js"></script>
        <script src="js-libs/OrbitControls.js"></script>
        <script src="js-libs/Detector.js"></script>
        <script src="js-libs/stats.min.js"></script>
        <script src="js-libs/mustache.min.js"></script>
        <script src="js-libs/dat.gui.min.js"></script>
        <script src="js-libs/webm-muxer.js"></script>
        <script src="three-js-monkey-patch.js"></script>

        <script id="vertex-shader" type="x-shader/x-vertex">

            void main()    {

                gl_Position = vec4( position, 1.0 );

            }

        </script>

        <!-- App modules (load order matters — later files depend on earlier ones) -->
        <script src="js/app/core/observer.js"></script>
        <script src="js/app/core/shader.js?v=20260614-pencil"></script>
        <script src="js/app/scene/camera.js"></script>
        <script src="js/app/graphics/bloom.js"></script>
        <script src="js/app/graphics/sketch.js?v=20260621-beaming"></script>
        <script src="js/app/ui/presets.js"></script>
        <script src="js/app/ui/quality-presets.js"></script>
        <script src="js/app/presentation/presentation-controller.js"></script>
        <script src="js/app/presentation/timeline-panel.js"></script>
        <script src="js/app/presentation/presentation-gui.js"></script>
        <script src="js/app/ui/gui.js?v=20260226-2"></script>
        <script src="js/app/core/renderer.js?v=20260622-perf"></script>
        <script src="js/app/bootstrap.js?v=20260622-disk-reveal"></script>

        <!-- Background-mode: keep drag-to-orbit, hide the editing chrome the app
             builds at runtime, and forward wheel to the host page so scrolling
             over the background still scrolls the site (never zooms). -->
        <script>
            (function () {
                window.addEventListener('wheel', function (e) {
                    try { e.stopPropagation(); if (window.parent && window.parent !== window) window.parent.scrollBy(0, e.deltaY); } catch (_) {}
                }, { capture: true, passive: true });
                function clean() {
                    ['controls-panel','controls-open-btn','controls-close-btn','observer-orbit-shell','tl-panel'].forEach(function (id) {
                        var e = document.getElementById(id); if (e) e.style.display = 'none';
                    });
                    Array.prototype.forEach.call(document.querySelectorAll('.observer-orbit-tag, .link-bar, #hint-text, .info, .dg'), function (e) { e.style.display = 'none'; });
                    Array.prototype.forEach.call(document.querySelectorAll('button, div, span, a'), function (e) {
                        var tt = (e.textContent || '').toUpperCase().replace(/[▲▼◀▶\s]/g, '');
                        if ((tt === 'CONTROLS' || tt === 'ANIMATIONS' || tt === 'TIMELINE') && e.children.length <= 1) e.style.display = 'none';
                    });
                    Array.prototype.forEach.call(document.querySelectorAll('body *'), function (e) {
                        var cs = getComputedStyle(e);
                        if (cs.position === 'fixed' && parseInt(cs.top) <= 4 && parseInt(cs.left) <= 4 && e.offsetWidth > 0 && e.offsetWidth < 150 && e.offsetHeight < 130) e.style.display = 'none';
                    });
                }
                window.addEventListener('load', function () { clean(); setTimeout(clean, 600); setTimeout(clean, 1500); setTimeout(clean, 3000); setTimeout(clean, 5000); });
            })();
        </script>

    </body>
</html>
